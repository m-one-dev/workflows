name: Claude Context & Maintenance Review

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: "25"
      job_title:
        required: false
        type: string
      job_user:
        required: false
        type: string
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  claude-context-maintenance-review:
    if: |
      !contains(job_title, '[skip-review]') &&
      !contains(job_title, '--skip-claude') &&
      job_user != 'dependabot[bot]'

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: true

      - name: Run Claude Context & Maintenance Review
        id: claude-context-maintenance-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: '/review-context-maintenance ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,mcp__github__get_pull_request,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(git ls-files:*),Bash(grep:*)"
            --model sonnet
            --max-turns 20
