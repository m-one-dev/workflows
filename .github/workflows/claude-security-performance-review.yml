name: Claude Security & Performance Review

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: "25"
      job_title:
        required: false
        type: string
      job_user:
        required: false
        type: string
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      PAT:
        required: true

jobs:
  claude-security-performance-review:
    if: |
      contains(inputs.job_title, '[security-review]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Fix submodule URLs
        run: |
          git config --global url."https://x-access-token:${{ secrets.PAT }}@github.com/".insteadOf "git@github.com:"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: true

      - name: Run Claude Security & Performance Review
        id: claude-security-performance-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: '/review-security-performance ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,mcp__github__get_pull_request,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(npm audit:*),Bash(yarn audit:*)"
            --model sonnet
            --max-turns 20
