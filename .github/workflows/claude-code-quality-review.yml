name: Claude Code Quality Review

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: "25"
      job_title:
        required: false
        type: string
      job_user:
        required: false
        type: string
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  claude-code-quality-review:
    # Optional: Filter by PR author
    if: |
      !contains(inputs.job_title, '[skip-review]') &&
      !contains(inputs.job_title, '--skip-claude') &&
      inputs.job_user != 'dependabot[bot]'
    # if: |
    #   inputs.job_user == 'external-contributor' ||
    #   inputs.job_user == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: true

      - name: Run Claude Code Review
        id: claude-code-quality-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          prompt: '/review-codequality ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,mcp__github__add_issue_comment,mcp__github__get_pull_request,mcp__github__add_pull_request_review_comment_to_pending_review,Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"
            --model sonnet
